name: GitOps Release Handoff

on:
  push:
    tags:
      - 'v*'

jobs:
  gitops-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 
    steps:
      - name: 📥 Checkout Application Code
        uses: actions/checkout@v4

      - name: 🏷️ Extract Tag Name
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: 🐳 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.actor }}/poc-helios-backend:${{ env.TAG_NAME }}

      # --- THE NEW SMART ROUTING LOGIC ---
      - name: 🔀 Determine Environment (Staging vs Prod)
        run: |
          if [[ "${{ env.TAG_NAME }}" == *"-rc"* ]]; then
            echo "ENV_NAME=Staging" >> $GITHUB_ENV
            echo "FOLDER_PATH=staging" >> $GITHUB_ENV
          else
            echo "ENV_NAME=Production" >> $GITHUB_ENV
            echo "FOLDER_PATH=production" >> $GITHUB_ENV
          fi

      - name: 📥 Checkout Infrastructure Repository
        uses: actions/checkout@v4
        with:
          repository: hezkiawan/poc-helios-infra
          token: ${{ secrets.INFRA_PAT }}
          path: infra-repo

      - name: ✍️ Update Deployment Manifest
        run: |
          cd infra-repo/${{ env.FOLDER_PATH }}
          sed -i "s|image: ghcr.io/.*/poc-helios-backend:.*|image: ghcr.io/${{ github.actor }}/poc-helios-backend:${{ env.TAG_NAME }}|g" deployment.yaml

      - name: 🚀 Create Pull Request in Infra Repo
        env:
          GH_TOKEN: ${{ secrets.INFRA_PAT }}
        run: |
          cd infra-repo
          git config user.name "GitOps Bot"
          git config user.email "bot@helios.poc"

          # Create a unique branch name based on the environment
          BRANCH_NAME="release/${{ env.FOLDER_PATH }}-${{ env.TAG_NAME }}"
          git checkout -b $BRANCH_NAME

          if [[ -n $(git status -s) ]]; then
            git add ${{ env.FOLDER_PATH }}/deployment.yaml
            git commit -m "chore(deploy): update ${{ env.ENV_NAME }} image to ${{ env.TAG_NAME }}"
            git push origin $BRANCH_NAME

            # The PR title and body dynamically adapt to the target environment
            gh pr create \
              --title "🚀 Deploy Backend ${{ env.TAG_NAME }} to ${{ env.ENV_NAME }}" \
              --body "Automated PR from RnD. Image successfully built and pushed to GHCR. Please review and merge to update the **${{ env.ENV_NAME }}** environment." \
              --base main \
              --head $BRANCH_NAME
          else
            echo "No changes detected."
          fi